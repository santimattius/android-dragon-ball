name: Android CI

on:
  push:
    branches: [ master, feature/r8-analyzer-demo ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      r8_tags:
        description: 'Tags a analizar (separados por coma, ej: r8-demo/01-broad-rule,r8-demo/02-surgical-rule)'
        required: false
        default: 'r8-demo/01-broad-rule,r8-demo/02-surgical-rule'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Run Detekt
        run: ./gradlew detekt

  r8-analyzer:
    runs-on: ubuntu-latest
    needs: build
    # Genera reportes HTML del R8 Configuration Analyzer para cada tag del demo.
    # Requiere dispatch manual: Actions → Run workflow → opcionalmente elegir tags.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para poder hacer checkout de tags

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate R8 Configuration Analyzer reports
        run: |
          TAGS="${{ github.event.inputs.r8_tags }}"
          IFS=',' read -ra TAG_LIST <<< "$TAGS"
          mkdir -p /tmp/r8-reports

          for TAG in "${TAG_LIST[@]}"; do
            TAG="$(echo "$TAG" | xargs)"  # trim spaces
            NAME="${TAG//\//-}"
            REPORT_DIR="/tmp/r8-reports/$NAME"
            mkdir -p "$REPORT_DIR"

            echo "→ Analizando $TAG..."
            git checkout "$TAG"
            ./gradlew :app:assembleBenchmark \
              "-Dcom.android.tools.r8.dumpkeepradiushtmltodirectory=$REPORT_DIR" \
              --no-daemon --quiet
            echo "  ✓ Reporte generado en $REPORT_DIR/"
          done

          git checkout ${{ github.ref_name }}

      - name: Upload R8 analyzer reports
        uses: actions/upload-artifact@v4
        with:
          name: r8-analyzer-reports-${{ github.run_number }}
          path: /tmp/r8-reports/**/*.html
          if-no-files-found: error

  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    # Smoke tests corren sobre el build minificado (benchmark) vía Gradle Managed Device.
    # Path-based filtering en jobs no está soportado nativamente en GitHub Actions;
    # usar dispatch manual después de cambios en proguard-rules.pro.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run smoke tests on GMD (minified build)
        run: >
          ./gradlew :app:pixel6Api34BenchmarkAndroidTest
          -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect
          -Pandroid.testInstrumentationRunnerArguments.annotation=com.santimattius.basic.skeleton.smoke.SmokeTest
          --no-daemon
